spring.application.name=app
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/realtor-bg?sessionVariables=sql_mode='NO_ENGINE_SUBSTITUTION'&jdbcCompliantTruncation=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.datasource.initialization-mode=${SPRING_DATASOURCE_INITIALIZATION_MODE:always}

# OAuth2 properties with default values
spring.security.oauth2.client.registration.keycloak.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID:realtor-bg-client}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_AUTHORIZATION_GRANT_TYPE:authorization_code}
spring.security.oauth2.client.registration.keycloak.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET:sfOJIkBVaMPWD6sgL71aK8MlmxHVkUEZ}
spring.security.oauth2.client.registration.keycloak.scope=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_SCOPE:openid}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9080/realms/RealtorBGRealm/protocol/openid-connect/certs